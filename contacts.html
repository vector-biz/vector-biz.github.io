   <div class="container">
        <h1>Контакти</h1>
        <form id="contactForm">
            <div class="form-group">
                <label for="name">Ім’я:</label>
                <input type="text" id="name" name="name" placeholder="Введіть ваше ім'я" required>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Введіть електронний адрес" required>
            </div>
            <div class="form-group">
                <label for="message">Повідомлення:</label>
                <textarea id="message" name="message" placeholder="Введіть ваше повідомлення" rows="5" required></textarea>
            </div>
            <button type="submit">Надіслати</button>
        </form>
        <p>Телефон: +38 XXX XXX XX XX</p>
